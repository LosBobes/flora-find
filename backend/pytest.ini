[pytest]
# Only collect from the tests/ dir so a stray *_test file elsewhere in the
# backend (e.g. a scratch script) isn't picked up.
testpaths = tests

# Fail fast on typos: an unknown marker or a bad config key is an error, not a
# silent no-op.
addopts = -q --strict-markers --strict-config

# Surface our own DeprecationWarnings, but silence the known third-party one
# from Starlette's TestClient so it doesn't drown real signal. Remove the
# ignore once the dependency stops emitting it.
filterwarnings =
    default
    ignore:Using `httpx` with `starlette.testclient`:DeprecationWarning
    ignore:Using `httpx` with `starlette.testclient`:UserWarning
